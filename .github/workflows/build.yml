---
name: Build
'on':
  push:
    branches:
    - main
    tags:
    - "**"
  pull_request_target:
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout
      uses: actions/checkout@v7
    - name: Build
      run: /usr/bin/true

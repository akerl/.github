name: Base Ruby CI
description: Checkout repo, install Ruby, and run rake
runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@v7
      with:
        fetch-depth: 0
        submodules: recursive
    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: '4.0.5'
        bundler-cache: true
    - name: Build
      run: bundle exec rake
